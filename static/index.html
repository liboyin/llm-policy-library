<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Library — NIST SP 800-53 control search</title>
    <style>
        /* Self-contained by design: no CDN, no webfont, no framework. The page is
           served from the same origin as the API it calls, so it works offline,
           behind a corporate proxy, and in an air-gapped deployment. */
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #263449;
            --border: #334155;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #60a5fa;
            --good: #34d399;
            --warn: #fbbf24;
            --bad: #f87171;
            --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 3rem 1rem 5rem;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 820px; margin: 0 auto; }

        header { margin-bottom: 2rem; }

        h1 {
            font-size: 1.75rem;
            margin: 0 0 0.35rem;
            letter-spacing: -0.01em;
        }

        .subtitle { color: var(--text-dim); margin: 0; }

        form {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        #query {
            flex: 1;
            min-width: 0;
            padding: 0.75rem 1rem;
            font: inherit;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }

        #query:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        #query::placeholder { color: #64748b; }

        button {
            padding: 0.75rem 1.5rem;
            font: inherit;
            font-weight: 600;
            color: #0f172a;
            background: var(--accent);
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        button:hover:not(:disabled) { background: #93c5fd; }
        button:disabled { opacity: 0.55; cursor: progress; }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .example {
            padding: 0.3rem 0.7rem;
            font-size: 0.8125rem;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 9999px;
            cursor: pointer;
        }

        .example:hover { color: var(--text); background: var(--surface); }

        section {
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
        }

        [hidden] { display: none !important; }

        h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin: 0 0 0.75rem;
        }

        /* `pre-wrap` preserves the answer's paragraphs without turning the text
           into markup — see the `textContent` note in the script below. */
        #answer {
            white-space: pre-wrap;
            margin: 0;
        }

        #plan-steps { margin: 0.5rem 0 0; padding-left: 1.25rem; }
        #plan-steps li { margin-bottom: 0.5rem; }
        .step-query { font-family: var(--mono); font-size: 0.875rem; }
        .step-purpose { color: var(--text-dim); font-size: 0.875rem; }

        .control {
            padding: 0.875rem 1rem;
            margin-bottom: 0.625rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--border);
            border-radius: 0.5rem;
        }

        .control.cited { border-left-color: var(--good); }

        .control-head {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.625rem;
        }

        .control-id {
            font-family: var(--mono);
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
        }

        .control-title { font-weight: 600; }

        .cited-flag {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--good);
        }

        .control-meta {
            font-size: 0.8125rem;
            color: var(--text-dim);
            margin-top: 0.125rem;
        }

        .control details { margin-top: 0.5rem; }

        .control summary {
            font-size: 0.8125rem;
            color: var(--text-dim);
            cursor: pointer;
        }

        .statement {
            white-space: pre-wrap;
            font-size: 0.9375rem;
            color: #cbd5e1;
            margin: 0.5rem 0 0;
        }

        footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .badge { font-weight: 600; }
        .badge.grounded { color: var(--good); }
        .badge.fallback { color: var(--warn); }

        #status { color: var(--text-dim); }
        #error { color: var(--bad); border-color: #7f1d1d; background: #2a1215; }
        #correlation { font-family: var(--mono); font-size: 0.8125rem; color: var(--text-dim); }

        @media (max-width: 600px) {
            form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Policy Library</h1>
            <p class="subtitle">Ask a question about the NIST SP 800-53 Rev 5 security controls.</p>
        </header>

        <form id="ask">
            <input id="query" type="text" required autocomplete="off"
                   aria-label="Your policy question"
                   placeholder="What controls apply to API security?">
            <button id="ask-button" type="submit">Ask</button>
        </form>

        <div class="examples" id="examples"></div>

        <p id="status" role="status" aria-live="polite" hidden></p>

        <section id="error" role="alert" hidden>
            <h2>Error</h2>
            <p id="error-text"></p>
            <p id="correlation" hidden></p>
        </section>

        <div id="result" hidden>
            <section>
                <h2>Answer</h2>
                <p id="answer"></p>
            </section>

            <section>
                <h2>Plan</h2>
                <details>
                    <summary id="plan-summary"></summary>
                    <ol id="plan-steps"></ol>
                </details>
            </section>

            <section>
                <h2>Retrieved controls</h2>
                <div id="controls"></div>
                <p id="no-controls" hidden>Nothing scored above the relevance floor, so no
                    control was passed to the response agent.</p>
            </section>

            <footer>
                <span id="verdict" class="badge"></span>
                <span id="latency"></span>
            </footer>
        </div>
    </div>

    <script>
        // Every value that reaches the DOM below is written with `textContent`, never
        // `innerHTML`. The answer is model-generated and can echo the user's own query,
        // so an HTML sink here would let a crafted question — or a crafted line in the
        // corpus — execute script in the reader's browser.
        const EXAMPLES = [
            "What controls apply to API security?",
            "How should sensitive data be protected in cloud systems?",
            "Summarise requirements for access control",
            "What policies relate to logging and monitoring?",
        ];

        // A hung upstream must not strand the page on "Planning…" forever. Well above the
        // measured p99 (~11s), so it only ever fires on a genuinely dead request.
        const REQUEST_TIMEOUT_MS = 120_000;

        const form = document.getElementById("ask");
        const queryInput = document.getElementById("query");
        const submitButton = document.getElementById("ask-button");
        const statusLine = document.getElementById("status");
        const errorBox = document.getElementById("error");
        const errorText = document.getElementById("error-text");
        const correlationLine = document.getElementById("correlation");
        const resultBox = document.getElementById("result");
        const answerText = document.getElementById("answer");
        const planSummary = document.getElementById("plan-summary");
        const planSteps = document.getElementById("plan-steps");
        const controlList = document.getElementById("controls");
        const noControls = document.getElementById("no-controls");
        const verdict = document.getElementById("verdict");
        const latency = document.getElementById("latency");

        for (const example of EXAMPLES) {
            const chip = document.createElement("button");
            chip.type = "button";
            chip.className = "example";
            chip.textContent = example;
            chip.addEventListener("click", () => {
                queryInput.value = example;
                form.requestSubmit();
            });
            document.getElementById("examples").appendChild(chip);
        }

        /** Render the Planner's steps, which say what was searched and why. */
        function renderPlan(plan) {
            const steps = plan?.steps ?? [];
            planSummary.textContent = `${steps.length} search ${steps.length === 1 ? "step" : "steps"}`;
            planSteps.replaceChildren();
            for (const step of steps) {
                const item = document.createElement("li");
                const searched = document.createElement("div");
                searched.className = "step-query";
                searched.textContent = step.search_query;
                const purpose = document.createElement("div");
                purpose.className = "step-purpose";
                purpose.textContent = step.purpose;
                item.append(searched, purpose);
                planSteps.appendChild(item);
            }
        }

        /** Render the grounding set, marking the controls the answer actually cited. */
        function renderControls(documents, citations) {
            const cited = new Set(citations.map((id) => id.toLowerCase()));
            controlList.replaceChildren();
            noControls.hidden = documents.length > 0;

            for (const control of documents) {
                const card = document.createElement("div");
                const isCited = cited.has(control.id.toLowerCase());
                card.className = isCited ? "control cited" : "control";

                const head = document.createElement("div");
                head.className = "control-head";
                const id = document.createElement("span");
                id.className = "control-id";
                id.textContent = control.id;
                const title = document.createElement("span");
                title.className = "control-title";
                title.textContent = control.title;
                head.append(id, title);
                if (isCited) {
                    const flag = document.createElement("span");
                    flag.className = "cited-flag";
                    flag.textContent = "cited";
                    head.appendChild(flag);
                }

                const meta = document.createElement("div");
                meta.className = "control-meta";
                meta.textContent = `${control.category} · score ${control.score.toFixed(2)}`;

                const details = document.createElement("details");
                const summary = document.createElement("summary");
                summary.textContent = "Statement";
                const statement = document.createElement("p");
                statement.className = "statement";
                statement.textContent = control.description;
                details.append(summary, statement);

                card.append(head, meta, details);
                controlList.appendChild(card);
            }
        }

        /** Show a failure without leaking anything the API chose not to disclose. */
        function showError(message, correlationId) {
            errorText.textContent = message;
            correlationLine.textContent = correlationId ? `Correlation ID: ${correlationId}` : "";
            correlationLine.hidden = !correlationId;
            errorBox.hidden = false;
            // The box is `role="alert"`, so it announces itself; leaving the polite status
            // line up as well would have a screen reader read the two over each other.
            statusLine.hidden = true;
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            // The example chips submit the form directly, and `requestSubmit()` ignores the
            // disabled state of the button — without this guard a chip clicked mid-flight
            // starts a second request, and the slower response overwrites the newer answer.
            if (submitButton.disabled) return;

            const question = queryInput.value.trim();
            if (!question) {
                // `required` accepts whitespace, so a blank-looking query would otherwise
                // return here in silence, leaving a pressed button that does nothing.
                queryInput.value = "";
                queryInput.reportValidity();
                return;
            }

            submitButton.disabled = true;
            statusLine.textContent = "Planning, retrieving, and grounding an answer…";
            statusLine.hidden = false;
            errorBox.hidden = true;
            resultBox.hidden = true;

            try {
                const response = await fetch("/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query: question }),
                    signal: AbortSignal.timeout(REQUEST_TIMEOUT_MS),
                });
                const correlationId = response.headers.get("X-Correlation-ID");

                if (!response.ok) {
                    // Only 502 carries a message meant for a human, and it is the fixed safe
                    // string. Every other status (422's `detail` is a list, not a string)
                    // falls back to naming the status, which discloses nothing.
                    const body = await response.json().catch(() => null);
                    const detail = typeof body?.detail === "string"
                        ? body.detail
                        : `The service answered with HTTP ${response.status}.`;
                    showError(detail, correlationId);
                    return;
                }

                const data = await response.json();
                answerText.textContent = data.answer;
                renderPlan(data.plan);
                renderControls(data.retrieved ?? [], data.citations ?? []);

                verdict.textContent = data.is_fallback ? "Safe fallback" : "Grounded answer";
                verdict.className = data.is_fallback ? "badge fallback" : "badge grounded";
                latency.textContent = `${Math.round(data.latency_ms).toLocaleString()} ms`;
                resultBox.hidden = false;
                // The result is not a live region — announcing every section would be noisy —
                // so this polite line is what tells a screen reader the answer has arrived.
                statusLine.textContent = "Answer ready.";
            } catch (error) {
                // Logged, not shown: a contract violation from the API would otherwise be
                // indistinguishable from an unplugged network cable.
                console.error(error);
                showError(
                    error.name === "TimeoutError"
                        ? "The policy library took too long to answer. Please try again."
                        : "Could not reach the policy library. Check that the service is running."
                );
            } finally {
                submitButton.disabled = false;
                // Disabling the focused button drops focus to <body>; put it back so the
                // keyboard user is not silently returned to the top of the document.
                if (document.activeElement === document.body) submitButton.focus();
            }
        });
    </script>
</body>
</html>
